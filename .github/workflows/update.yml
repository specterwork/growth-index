name: update-data

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install yfinance
      - name: Build data.json
        run: python build_data.py
      - name: Build daily posts
        run: python build_posts.py
      - name: Commit & push
        run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json posts/
          git diff --cached --quiet || git commit -m "auto update"
          git push
